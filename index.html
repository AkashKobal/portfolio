<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Site Under Maintenance</title>
    <!-- Tailwind CSS for rapid styling -->
    <script src="https://jsdelivr.net"></script>
    <!-- FontAwesome for icons -->
    <link rel="stylesheet" href="https://cloudflare.com">
    <style>
        @keyframes float {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-20px) rotate(10deg); }
        }
        @keyframes pulse-slow {
            0%, 100% { transform: scale(1); opacity: 0.3; }
            50% { transform: scale(1.05); opacity: 0.5; }
        }
        @keyframes gradientShift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        .animated-bg {
            background: linear-gradient(-45deg, #0f172a, #1e1b4b, #312e81, #0f172a);
            background-size: 400% 400%;
            animation: gradientShift 15s ease infinite;
        }
        .floating-shape {
            animation: float 6s ease-in-out infinite;
        }
        .glow-circle {
            animation: pulse-slow 4s ease-in-out infinite;
        }
    </style>
</head>
<body class="animated-bg min-h-screen flex items-center justify-center px-4 relative overflow-hidden font-sans text-white">

    <!-- Decorative Floating Elements -->
    <div class="absolute top-20 left-10 w-72 h-72 bg-indigo-500 rounded-full filter blur-3xl glow-circle opacity-30"></div>
    <div class="absolute bottom-10 right-10 w-96 h-96 bg-purple-600 rounded-full filter blur-3xl glow-circle opacity-20"></div>

    <!-- Main Container -->
    <div class="relative z-10 w-full max-w-2xl bg-slate-900/40 backdrop-blur-xl border border-slate-800 rounded-3xl p-10 md:p-14 shadow-2xl text-center transform transition-all">
        
        <!-- Animated Gear/Tool Icon -->
        <div class="flex justify-center mb-8">
            <div class="relative floating-shape">
                <i class="fa-solid fa-gear text-7xl text-indigo-400"></i>
                <i class="fa-solid fa-wrench text-4xl text-purple-400 absolute bottom-0 right-0 transform translate-x-2 translate-y-2"></i>
            </div>
        </div>

        <!-- Heading -->
        <h1 class="text-4xl md:text-5xl font-extrabold mb-4 bg-clip-text text-transparent bg-gradient-to-r from-indigo-300 via-white to-purple-300">
            We're Upgrading!
        </h1>
        
        <p class="text-slate-400 text-lg mb-8 max-w-xl mx-auto">
            Our website is currently undergoing scheduled maintenance. We are working hard to bring you a better and faster experience. 
        </p>

        <!-- Countdown Timer -->
        <div class="mb-10">
            <p class="text-xs uppercase tracking-widest text-slate-500 mb-4">Launching In</p>
            <div class="flex justify-center gap-4 text-center">
                <div class="bg-slate-800/80 rounded-xl p-4 w-20 border border-slate-700/50">
                    <span id="days" class="text-2xl md:text-3xl font-bold text-indigo-400 block">00</span>
                    <span class="text-[10px] text-slate-400 uppercase tracking-wider">Days</span>
                </div>
                <div class="bg-slate-800/80 rounded-xl p-4 w-20 border border-slate-700/50">
                    <span id="hours" class="text-2xl md:text-3xl font-bold text-indigo-400 block">00</span>
                    <span class="text-[10px] text-slate-400 uppercase tracking-wider">Hours</span>
                </div>
                <div class="bg-slate-800/80 rounded-xl p-4 w-20 border border-slate-700/50">
                    <span id="minutes" class="text-2xl md:text-3xl font-bold text-indigo-400 block">00</span>
                    <span class="text-[10px] text-slate-400 uppercase tracking-wider">Mins</span>
                </div>
                <div class="bg-slate-800/80 rounded-xl p-4 w-20 border border-slate-700/50">
                    <span id="seconds" class="text-2xl md:text-3xl font-bold text-indigo-400 block">00</span>
                    <span class="text-[10px] text-slate-400 uppercase tracking-wider">Secs</span>
                </div>
            </div>
        </div>

        <!-- Notification/Contact Box -->
        <div class="bg-slate-800/50 rounded-2xl p-6 border border-slate-700/30 max-w-md mx-auto">
            <p class="text-slate-300 mb-3 font-medium">Need to reach us urgently?</p>
            <a href="mailto:support@example.com" class="inline-flex items-center gap-2 bg-gradient-to-r from-indigo-500 to-purple-600 hover:from-indigo-600 hover:to-purple-700 text-white px-6 py-3 rounded-xl transition duration-300 font-semibold shadow-lg shadow-indigo-500/25">
                <i class="fa-regular fa-envelope"></i> Contact Support
            </a>
        </div>

        <!-- Footer -->
        <div class="mt-12 pt-6 border-t border-slate-800/50 text-slate-500 text-sm">
            <p>&copy; 2026 Your Company. All rights reserved.</p>
        </div>
    </div>

    <!-- Countdown Script -->
    <script>
        // Set the target launch date (e.g., 3 days from now)
        const countDownDate = new Date().getTime() + (3 * 24 * 60 * 60 * 1000);

        const x = setInterval(function() {
            const now = new Date().getTime();
            const distance = countDownDate - now;

            const days = Math.floor(distance / (1000 * 60 * 60 * 24));
            const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
            const seconds = Math.floor((distance % (1000 * 60)) / 1000);

            // Display results
            document.getElementById("days").innerText = days < 10 ? "0" + days : days;
            document.getElementById("hours").innerText = hours < 10 ? "0" + hours : hours;
            document.getElementById("minutes").innerText = minutes < 10 ? "0" + minutes : minutes;
            document.getElementById("seconds").innerText = seconds < 10 ? "0" + seconds : seconds;

            // If countdown is finished
            if (distance < 0) {
                clearInterval(x);
                document.getElementById("days").innerText = "00";
                document.getElementById("hours").innerText = "00";
                document.getElementById("minutes").innerText = "00";
                document.getElementById("seconds").innerText = "00";
            }
        }, 1000);
    </script>
</body>
</html>
